# Conda environment for the MTP decoding benchmark.
#
# Create it with:
#     conda env create -f environment.yml
#     conda activate mtp-bench
#
# Notes:
# - We let conda manage Python + CUDA runtime, then pip-install the ML stack so
#   we get the official CUDA wheels for PyTorch (more reliable than conda-forge).
# - Built for CUDA 13.0 (cu130). `nvidia-smi` reporting "CUDA Version: 13.0" means
#   your driver supports up to 13.0; it is also backward-compatible, so cu128/cu126
#   wheels would run too. Use --extra-index-url (NOT --index-url): the cu130 index
#   is missing a cuda-bindings dep and --index-url installs break on it.
name: mtp-bench
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - git            # needed to pip-install human-eval from source
  - pip:
      # --- PyTorch (CUDA 13.0 build). cu130 wheels require torch >= 2.10. ---
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch>=2.10
      # --- Hugging Face stack ---
      - transformers>=4.44
      - accelerate>=0.33
      - datasets>=2.20
      - huggingface_hub>=0.24
      - sentencepiece
      - safetensors
      # --- utilities ---
      - numpy
      - tqdm
      - tabulate          # pretty result tables
      # --- HumanEval execution harness (optional, only for the coding task) ---
      - human-eval
